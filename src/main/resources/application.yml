server:
  port: 8080

spring:
  application:
    name: aws-lab-backend
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: always

cloud:
  aws:
    region: ap-northeast-2
    s3:
      bucket: ${S3_BUCKET_NAME:awslab2026-bucket-test}